<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xabarlar — MotorMarket</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .chat-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: calc(100vh - 120px); }
  .chat-sidebar { border-right: 1px solid var(--border); overflow-y: auto; padding-right: 10px; }
  .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 8px; transition: 0.2s; }
  .chat-item:hover { background: var(--bg-hover); }
  .chat-item.active { background: var(--bg-hover); border-color: var(--primary); }
  .chat-main { display: flex; flex-direction: column; height: 100%; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
  .chat-header { padding: 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
  .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; word-break: break-word; color: var(--text); }
  .msg-me { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .msg-other { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .chat-input { padding: 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 12px; }
  .chat-input input { flex: 1; border-radius: 8px; border: 1px solid var(--border); padding: 0 16px; outline: none; background: var(--bg); color: var(--text); }
  .chat-input input:focus { border-color: var(--primary); }
  .time-lbl { font-size: 11px; opacity: 0.7; margin-top: 6px; text-align: right; display: block; color: inherit; }
  
  .back-btn { display: none; cursor: pointer; color: var(--primary); font-weight: 500; margin-right: 16px; }
  @media (max-width: 768px) {
    .chat-layout { grid-template-columns: 1fr; }
    .chat-sidebar { display: none; }
    .chat-layout.show-sidebar .chat-sidebar { display: block; border-right: none; }
    .chat-layout.show-sidebar .chat-main { display: none; }
    .back-btn { display: inline-block; }
  }
</style>
</head>
<body>
<header class="mm-nav" id="mm-nav"></header>

<main class="container" style="padding-top: 20px;">
  <div class="chat-layout show-sidebar" id="chat-layout">
    
    <aside class="chat-sidebar">
      <h3 style="margin-top:0; margin-bottom:16px;">Suhbatlar</h3>
      <div id="chat-list">
        <!-- Chat list loads here -->
      </div>
    </aside>

    <section class="chat-main" id="chat-main">
      <div class="chat-header">
        <span class="back-btn" id="back-to-list">← Orqaga</span>
        <h3 id="chat-title" style="margin:0;">Suhbatdosh</h3>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div style="margin:auto; color:#999;">Suhbatni tanlang</div>
      </div>
      <form class="chat-input" id="chat-form" style="display:none;">
        <input type="text" id="msg-input" placeholder="Xabar yozing..." required autocomplete="off">
        <button type="submit" class="btn btn--accent" id="send-btn">Yuborish</button>
      </form>
    </section>

  </div>
</main>

<script src="js/api.js?v=4"></script>
<script src="js/ui.js?v=3"></script>
<script src="js/chat.js?v=1"></script>
</body>
</html>
