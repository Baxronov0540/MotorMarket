<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish — MotorMarket</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="mm-nav" id="mm-nav"></header>

<main class="container narrow" style="padding:60px 24px 100px;">
  <div class="form-card">
    <div class="tabs">
      <button type="button" id="tab-login" class="is-active">Kirish</button>
      <button type="button" id="tab-register">Ro'yxatdan o'tish</button>
    </div>

    <!-- LOGIN -->
    <form id="login-form">
      <div class="error-box" id="login-error"></div>
      <div class="form-row">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required placeholder="you@example.com">
      </div>
      <div class="form-row">
        <label for="login-password">Parol</label>
        <input type="password" id="login-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn--accent btn--block">Kirish</button>
    </form>

    <!-- REGISTER (step 1: email/password) -->
    <form id="register-form" style="display:none;">
      <div class="error-box" id="register-error"></div>
      <p class="hint" style="margin-bottom:16px;">Ro'yxatdan o'tgach, emailingizga 6 xonali tasdiqlash kodi yuboriladi.</p>
      <div class="form-row">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" required placeholder="you@example.com">
      </div>
      <div class="form-row">
        <label for="reg-password">Parol</label>
        <input type="password" id="reg-password" required placeholder="Kamida 8 belgi" minlength="6">
      </div>
      <button type="submit" class="btn btn--accent btn--block">Tasdiqlash kodini olish</button>
    </form>

    <!-- REGISTER (step 2: confirm code) -->
    <form id="confirm-form" style="display:none;">
      <div class="error-box" id="confirm-error"></div>
      <p class="hint" style="margin-bottom:16px;">Emailingizga yuborilgan 6 xonali kodni kiriting.</p>
      <div class="form-row">
        <label for="confirm-code">Tasdiqlash kodi</label>
        <input type="text" id="confirm-code" inputmode="numeric" pattern="[0-9]*" maxlength="6" required placeholder="123456" style="letter-spacing:0.3em; text-align:center; font-family:var(--font-mono); font-size:20px;">
      </div>
      <button type="submit" class="btn btn--accent btn--block">Tasdiqlash</button>
    </form>
  </div>
</main>

<footer class="mm-footer">
  <div class="container">
    <span>© <span id="mm-year"></span> MotorMarket</span>
  </div>
</footer>

<script src="js/api.js?v=3"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
